❤️<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anik-Matrix Cyber-Hub</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --danger: #ff0055; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; background: #020205; color: white; font-family: 'Orbitron', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .hub-container { background: var(--glass); backdrop-filter: blur(15px); padding: 25px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); width: 90%; max-width: 400px; text-align: center; box-shadow: 0 0 40px rgba(0, 242, 255, 0.1); }
        .header { font-size: 10px; letter-spacing: 2px; color: var(--neon); margin-bottom: 15px; }
        
        /* Video Displays */
        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        video { width: 100%; border-radius: 10px; background: black; border: 1px solid var(--neon); transform: scaleX(-1); }
        
        /* Chat Box */
        #chatBox { height: 120px; background: rgba(0,0,0,0.5); border-radius: 10px; overflow-y: auto; padding: 10px; font-size: 12px; text-align: left; margin-bottom: 10px; border: 1px solid #333; }
        .msg { margin-bottom: 5px; border-bottom: 1px solid #222; padding-bottom: 2px; }
        .msg.me { color: var(--neon); }

        input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid #444; padding: 10px; border-radius: 5px; color: white; box-sizing: border-box; margin-bottom: 5px; outline: none; }

        /* Controls */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 10px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 10px; }
        .btn-call { background: var(--neon); color: black; }
        
        /* PTT Button */
        #pttBtn { width: 80px; height: 80px; border-radius: 50%; background: black; border: 3px solid var(--danger); color: var(--danger); font-size: 10px; margin: 15px auto; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--danger); transition: 0.3s; }
        #pttBtn:active { background: var(--neon); color: black; box-shadow: 0 0 25px var(--neon); transform: scale(0.9); border-color: white; }
    </style>
</head>
<body>

<div class="hub-container">
    <div class="header">ANIK-MATRIX CYBER-HUB V2.0</div>
    
    <div class="video-grid">
        <video id="localVideo" autoplay muted></video>
        <video id="remoteVideo" autoplay></video>
    </div>

    <div id="myId" style="font-size: 11px; color: var(--neon); margin-bottom: 10px;">ID: CONNECTING...</div>
    <input type="text" id="peerId" placeholder="FRIEND'S ID">
    
    <div class="controls">
        <button class="btn-call" onclick="initiateVideoCall()">Video Call</button>
        <button style="background: #444; color: white;" onclick="connectChat()">Link Chat</button>
    </div>

    <div id="chatBox"></div>
    <input type="text" id="chatInput" placeholder="Secure Message..." onkeypress="if(event.key==='Enter') sendMessage()">

    <div id="pttBtn">HOLD<br>WALKIE</div>
    <div id="status" style="font-size: 10px; color: #666;">SYSTEM STANDBY</div>
</div>

<script>
    const peer = new Peer();
    let conn; // For Chat
    let currentCall; // For Walkie/Video
    const status = document.getElementById('status');
    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');

    peer.on('open', id => document.getElementById('myId').innerText = "YOUR ID: " + id);

    // --- 1. CHAT LOGIC ---
    function connectChat() {
        const friendId = document.getElementById('peerId').value;
        conn = peer.connect(friendId);
        setupChat();
    }

    peer.on('connection', c => {
        conn = c;
        setupChat();
    });

    function setupChat() {
        conn.on('data', data => appendMsg("Friend", data));
        status.innerText = "CHAT LINKED";
    }

    function sendMessage() {
        const msg = document.getElementById('chatInput').value;
        if(conn && msg) {
            conn.send(msg);
            appendMsg("Me", msg);
            document.getElementById('chatInput').value = "";
        }
    }

    function appendMsg(user, text) {
        const div = document.createElement('div');
        div.className = "msg " + (user === "Me" ? "me" : "");
        div.innerHTML = `[${user}]: ${text}`;
        document.getElementById('chatBox').appendChild(div);
        document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
    }

    // --- 2. VIDEO CALL LOGIC ---
    async function initiateVideoCall() {
        const friendId = document.getElementById('peerId').value;
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        localVideo.srcObject = stream;
        const call = peer.call(friendId, stream);
        call.on('stream', rStream => remoteVideo.srcObject = rStream);
        status.innerText = "VIDEO TRANSMITTING...";
    }

    peer.on('call', async call => {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        localVideo.srcObject = stream;
        call.answer(stream);
        call.on('stream', rStream => remoteVideo.srcObject = rStream);
        status.innerText = "INCOMING VIDEO...";
    });

    // --- 3. WALKIE TALKIE LOGIC (Audio Only) ---
    const pttBtn = document.getElementById('pttBtn');
    pttBtn.onmousedown = () => {
        const friendId = document.getElementById('peerId').value;
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            currentCall = peer.call(friendId, stream);
            status.innerText = "🎤 TRANSMITTING...";
        });
    };
    pttBtn.onmouseup = () => { if(currentCall) currentCall.close(); status.innerText = "IDLE"; };

</script>

</body>
</html>
