<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WA Style P2P Hub</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --wa-green: #00a884; --wa-dark: #111b21; --wa-chat-bg: #0b141a; --wa-input-bg: #2a3942; --wa-bubble-me: #005c4b; --wa-bubble-friend: #202c33; --wa-text: #e9edef; --wa-gray: #8696a0; --wa-danger: #ea4335; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* Dynamic VH for mobile keyboard issue */
        html, body { height: 100%; height: 100dvh; overflow: hidden; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--wa-dark); color: var(--wa-text); display: flex; flex-direction: column; }

        /* Header */
        .header { background: #202c33; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #2a3942; z-index: 10; flex-shrink: 0; }
        .header-title { font-size: 16px; font-weight: bold; color: var(--wa-text); display: flex; align-items: center; gap: 10px; }
        .header-title span { color: var(--wa-green); }
        .header-actions { display: flex; gap: 15px; }
        .icon-btn { background: none; border: none; color: var(--wa-gray); font-size: 20px; cursor: pointer; padding: 5px; border-radius: 50%; transition: 0.2s; }
        .icon-btn:hover { color: var(--wa-text); }

        /* Main Container - Fixed Flex Structure */
        .main-container { display: flex; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; position: relative; }
        
        /* Sidebar */
        .sidebar { background: var(--wa-dark); display: flex; flex-direction: column; flex-shrink: 0; z-index: 5; }
        .sidebar.hidden { display: none; }
        
        .qr-section { background: #111b21; padding: 15px; border-bottom: 1px solid #2a3942; text-align: center; }
        .qr-section input { width: 100%; background: var(--wa-input-bg); border: none; padding: 10px; border-radius: 8px; color: white; outline: none; margin-bottom: 10px; text-align: center; }
        .qr-section button { width: 100%; background: var(--wa-green); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #qrcode { display: inline-block; padding: 8px; background: white; border-radius: 8px; margin-top: 10px; }
        #qrcode img { display: block; }
        .my-id-display { font-size: 11px; color: var(--wa-green); margin-top: 8px; cursor: pointer; }

        /* Chat Area - Takes all available space */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--wa-chat-bg); min-height: 0; overflow: hidden; }
        .chat-header { background: #202c33; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .chat-user-info { display: flex; flex-direction: column; }
        .chat-user-name { font-weight: bold; font-size: 16px; }
        .chat-user-status { font-size: 12px; color: var(--wa-gray); }
        .call-btns { display: flex; gap: 15px; }
        .call-btn { background: none; border: none; color: var(--wa-gray); font-size: 22px; cursor: pointer; transition: 0.2s; }
        .call-btn:hover { color: var(--wa-green); }

        .chat-bg { flex: 1; overflow-y: auto; padding: 15px; background-image: url('https://upload.wikimedia.org/wikipedia/commons/5/56/WhatsApp_chat_background_image.jpg'); background-size: cover; opacity: 0.9; display: flex; flex-direction: column; gap: 5px; min-height: 0; }
        .chat-bg::-webkit-scrollbar { width: 6px; }
        .chat-bg::-webkit-scrollbar-thumb { background: #374045; border-radius: 10px; }

        .msg { max-width: 75%; padding: 8px 12px; border-radius: 8px; font-size: 14px; position: relative; line-height: 1.4; word-wrap: break-word; }
        .msg.me { background: var(--wa-bubble-me); align-self: flex-end; border-top-right-radius: 0; }
        .msg.friend { background: var(--wa-bubble-friend); align-self: flex-start; border-top-left-radius: 0; }
        .msg.system { background: transparent; color: var(--wa-gray); align-self: center; font-size: 12px; padding: 5px; border-radius: 5px; text-align: center; max-width: 90%; }
        .msg-time { font-size: 11px; color: rgba(255,255,255,0.5); text-align: right; margin-top: 4px; }
        .file-link { color: #fff; text-decoration: underline; display: inline-block; margin-top: 5px; background: rgba(0,0,0,0.2); padding: 3px 8px; border-radius: 4px; }

        /* Input Area - Stick to bottom */
        .input-area { background: #202c33; padding: 8px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .input-area input[type="text"] { flex: 1; background: var(--wa-input-bg); border: none; padding: 10px 15px; border-radius: 8px; color: white; outline: none; font-size: 14px; }
        .attach-btn { background: none; border: none; color: var(--wa-gray); font-size: 24px; cursor: pointer; transition: 0.2s; flex-shrink: 0; }
        .attach-btn:hover { color: var(--wa-text); }
        .send-btn { background: var(--wa-green); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

        /* FULL SCREEN Incoming Call Popup */
        .incoming-call-popup { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(17, 27, 33, 0.98); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .incoming-call-popup.active { display: flex; }
        .inc-avatar { width: 100px; height: 100px; background: var(--wa-input-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 50px; margin-bottom: 20px; animation: pulse 1.5s infinite; }
        .incoming-btns { display: flex; gap: 60px; margin-top: 40px; justify-content: center; }
        .inc-btn { width: 60px; height: 60px; border-radius: 50%; border: none; color: white; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .inc-btn.accept { background: var(--wa-green); }
        .inc-btn.reject { background: var(--wa-danger); }

        /* FULL SCREEN Call Screen Overlay */
        .call-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--wa-dark); z-index: 9998; display: none; flex-direction: column; align-items: center; justify-content: space-between; padding: 50px 20px; }
        .call-screen.active { display: flex; }
        .call-top { text-align: center; }
        .call-avatar { width: 100px; height: 100px; background: var(--wa-input-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 15px; }
        .call-name { font-size: 24px; font-weight: bold; }
        .call-status-text { color: var(--wa-gray); margin-top: 5px; }
        
        .call-videos { width: 100%; flex: 1; position: relative; border-radius: 15px; overflow: hidden; margin: 20px 0; background: #000; display: none; min-height: 0; }
        .call-videos.active { display: block; }
        .call-videos video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        #localVideo { z-index: 2; transform: scaleX(-1); width: 35% !important; height: auto !important; top: 15px; right: 15px; left: auto; border-radius: 10px; border: 2px solid var(--wa-green); }

        .call-bottom { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; padding-bottom: 30px; }
        .call-controls { display: flex; gap: 20px; justify-content: center; margin-bottom: 20px; }
        .ctrl-btn { width: 50px; height: 50px; border-radius: 50%; border: none; color: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .ctrl-btn.mic { background: var(--wa-input-bg); }
        .ctrl-btn.cam { background: var(--wa-input-bg); }
        .ctrl-btn.speaker { background: var(--wa-input-bg); }
        .ctrl-btn.hangup { background: var(--wa-danger); width: 60px; height: 60px; font-size: 24px; }
        .ctrl-btn.active { background: white; color: var(--wa-dark); }
        
        .ptt-btn { width: 100%; padding: 15px; background: var(--wa-input-bg); border: 2px solid var(--wa-green); color: var(--wa-green); border-radius: 30px; font-weight: bold; font-size: 14px; cursor: pointer; user-select: none; text-align: center; display: none; }
        .ptt-btn:active { background: var(--wa-green); color: white; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* Hide file input */
        #fileInput { display: none; }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="header-title"><span>⚡</span> WA P2P Hub</div>
        <div class="header-actions">
            <button class="icon-btn" onclick="toggleSidebar()" title="Show/Hide Link Panel">🔗</button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
        
        <!-- Sidebar (Link & QR) -->
        <div class="sidebar" id="sidebar">
            <div class="qr-section">
                <input type="text" id="codenameInput" placeholder="Enter your Codename" maxlength="15">
                <button onclick="initNetwork()">GO ONLINE</button>
                <div id="qrcode"></div>
                <div class="my-id-display" id="myIdDisplay" onclick="copyId()">Tap to copy ID</div>
                <div style="margin-top: 15px; border-top: 1px solid #2a3942; padding-top: 15px;">
                    <input type="text" id="peerIdInput" placeholder="Friend's Codename">
                    <button onclick="connectChat()">LINK CHAT</button>
                </div>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-user-info">
                    <div class="chat-user-name" id="chatPartnerName">No Chat Linked</div>
                    <div class="chat-user-status" id="chatPartnerStatus">Enter codename to connect</div>
                </div>
                <div class="call-btns">
                    <button class="call-btn" onclick="startCall('audio')" title="Audio Call">📞</button>
                    <button class="call-btn" onclick="startCall('video')" title="Video Call">📹</button>
                </div>
            </div>

            <div class="chat-bg" id="chatBox"></div>

            <div class="input-area">
                <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
                <input type="file" id="fileInput" onchange="sendFile(this)">
                <input type="text" id="chatInput" placeholder="Type a message" onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <!-- Incoming Call Popup (Full Screen Overlay) -->
    <div class="incoming-call-popup" id="incomingCallPopup">
        <div class="inc-avatar">👤</div>
        <div style="font-size: 24px; font-weight: bold;" id="callerName">Unknown</div>
        <div style="color: var(--wa-gray); margin-top: 10px; font-size: 16px;">Incoming Call...</div>
        <div class="incoming-btns">
            <button class="inc-btn reject" onclick="rejectCall()">📵</button>
            <button class="inc-btn accept" onclick="answerCall()">📞</button>
        </div>
    </div>

    <!-- Call Screen Overlay (Full Screen) -->
    <div class="call-screen" id="callScreen">
        <div class="call-top">
            <div class="call-avatar">👤</div>
            <div class="call-name" id="callNameDisplay">Friend</div>
            <div class="call-status-text" id="callStatusText">Calling...</div>
        </div>

        <div class="call-videos" id="callVideos">
            <video id="remoteVideo" autoplay playsinline></video>
            <video id="localVideo" autoplay muted playsinline></video>
        </div>

        <div class="call-bottom">
            <div class="call-controls">
                <button class="ctrl-btn mic" id="micBtn" onclick="toggleMic()">🎤</button>
                <button class="ctrl-btn cam" id="camBtn" onclick="toggleCam()">📷</button>
                <button class="ctrl-btn hangup" onclick="hangUp()">📵</button>
                <button class="ctrl-btn speaker" id="speakerBtn">🔊</button>
            </div>
            <button class="ptt-btn" id="pttBtn">HOLD TO TALK (WALKIE TALKIE)</button>
        </div>
    </div>

<script>
    // --- PEER & STATE LOGIC ---
    let peer;
    let conn = null;         
    let activeCall = null;   
    let localStream = null;
    let pendingCall = null;
    let isMicOn = true;
    let isCamOn = true;
    let callType = 'video'; 

    const chatBox = document.getElementById('chatBox');
    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');
    const callScreen = document.getElementById('callScreen');
    const callVideos = document.getElementById('callVideos');

    // --- AUDIO RINGTONE GENERATOR ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let callerToneInterval = null; // Tone for the person who is calling
    let receiverToneInterval = null; // Tone for the person receiving the call

    // Caller hears this (Beep... Beep... Beep)
    function playDialTone() {
        stopAllTones();
        let isPlaying = false;
        callerToneInterval = setInterval(() => {
            if (isPlaying) return;
            isPlaying = true;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
            
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 1);

            setTimeout(() => { isPlaying = false; }, 2000); // Wait 2 seconds between beeps
        }, 2500);
    }

    // Receiver hears this (Ring Ring... Ring Ring)
    function playIncomingRing() {
        stopAllTones();
        let isPlaying = false;
        receiverToneInterval = setInterval(() => {
            if (isPlaying) return;
            isPlaying = true;

            const playDoubleBeep = (startTime) => {
                const osc1 = audioCtx.createOscillator();
                const osc2 = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc1.connect(gain); osc2.connect(gain); gain.connect(audioCtx.destination);
                
                osc1.type = 'sine'; osc2.type = 'sine';
                osc1.frequency.setValueAtTime(480, startTime);
                osc2.frequency.setValueAtTime(440, startTime);
                
                gain.gain.setValueAtTime(0.4, startTime);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.8);
                
                osc1.start(startTime); osc1.stop(startTime + 0.8);
                osc2.start(startTime); osc2.stop(startTime + 0.8);
            };

            // Double Ring Effect
            playDoubleBeep(audioCtx.currentTime);
            playDoubleBeep(audioCtx.currentTime + 1.0);

            // Wait 4 seconds before repeating
            setTimeout(() => { isPlaying = false; }, 4000);
        }, 5000);
    }

    function stopAllTones() {
        if (callerToneInterval) clearInterval(callerToneInterval);
        if (receiverToneInterval) clearInterval(receiverToneInterval);
        callerToneInterval = null;
        receiverToneInterval = null;
    }

    // --- INIT NETWORK ---
    function initNetwork() {
        const myCodeName = document.getElementById('codenameInput').value.trim().toLowerCase();
        if (!myCodeName) return alert("Please enter a codename!");

        peer = new Peer(myCodeName);

        peer.on('open', id => {
            document.getElementById('myIdDisplay').innerText = "ID: " + id + " (Tap to copy)";
            appendMsg("System", "You are online as " + id);
            
            const currentUrl = window.location.href.split('?')[0];
            const shareUrl = currentUrl + "?id=" + id;
            const qrcodeContainer = document.getElementById('qrcode');
            qrcodeContainer.innerHTML = ""; 
            new QRCode(qrcodeContainer, { text: shareUrl, width: 100, height: 100, colorDark : "#000000", colorLight : "#ffffff" });

            const urlParams = new URLSearchParams(window.location.search);
            const targetId = urlParams.get('id');
            if (targetId && targetId !== id) {
                document.getElementById('peerIdInput').value = targetId;
                setTimeout(() => connectChat(), 1000);
            }
        });

        peer.on('connection', c => {
            conn = c;
            document.getElementById('peerIdInput').value = c.peer;
            setupChat();
        });

        peer.on('call', call => {
            pendingCall = call;
            callType = call.metadata.type || 'video';
            document.getElementById('callerName').innerText = call.peer;
            document.getElementById('incomingCallPopup').classList.add('active');
            playIncomingRing(); // Play incoming ringtone for receiver
        });

        peer.on('error', err => {
            appendMsg("System", "Error: " + err.type);
            if(err.type === 'unavailable-id') alert("Codename taken! Try another.");
            stopAllTones();
        });
    }

    function copyId() {
        if(peer && peer.id) {
            navigator.clipboard.writeText(peer.id);
            appendMsg("System", "Codename copied!");
        }
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('hidden');
    }

    // --- CHAT LOGIC ---
    function connectChat() {
        const friendId = document.getElementById('peerIdInput').value.trim().toLowerCase();
        if (!friendId) return appendMsg("System", "Enter Friend's Codename!");
        if (conn) return;
        conn = peer.connect(friendId);
        setupChat();
    }

    function setupChat() {
        conn.on('open', () => {
            document.getElementById('chatPartnerName').innerText = conn.peer;
            document.getElementById('chatPartnerStatus').innerText = "Online";
            appendMsg("System", "Chat secured with " + conn.peer);
            document.getElementById('sidebar').classList.add('hidden'); 
        });
        conn.on('data', data => {
            if (data.type === 'file') {
                const blob = new Blob([data.file], { type: data.fileType });
                const url = URL.createObjectURL(blob);
                const isImage = data.fileType.startsWith('image/');
                if (isImage) {
                    appendMsg("Friend", `<img src="${url}" style="max-width:100%; border-radius:8px; margin-bottom:5px;"><br><a href="${url}" download="${data.fileName}" class="file-link">📥 ${data.fileName}</a>`);
                } else {
                    appendMsg("Friend", `📄 Document: <a href="${url}" download="${data.fileName}" class="file-link">📥 ${data.fileName}</a>`);
                }
            } else {
                appendMsg("Friend", data.text || data);
            }
        });
        conn.on('close', () => {
            document.getElementById('chatPartnerName').innerText = "Disconnected";
            document.getElementById('chatPartnerStatus').innerText = "Offline";
            conn = null;
        });
    }

    function sendMessage() {
        const msg = document.getElementById('chatInput').value;
        if (conn && conn.open && msg) {
            conn.send({ type: 'text', text: msg });
            appendMsg("Me", msg);
            document.getElementById('chatInput').value = "";
        }
    }

    function sendFile(inputElement) {
        if (!conn || !conn.open) return appendMsg("System", "Connect to a friend first!");
        const file = inputElement.files[0];
        if (!file) return;

        if (file.size > 5 * 1024 * 1024) {
            return appendMsg("System", "File too large! Max 5MB.");
        }

        appendMsg("System", `Sending ${file.name}...`);
        const reader = new FileReader();
        reader.onload = function(e) {
            const fileData = e.target.result;
            conn.send({
                type: 'file',
                file: fileData,
                fileName: file.name,
                fileType: file.type
            });

            const blob = new Blob([fileData], { type: file.type });
            const url = URL.createObjectURL(blob);
            const isImage = file.type.startsWith('image/');
            if (isImage) {
                appendMsg("Me", `<img src="${url}" style="max-width:100%; border-radius:8px; margin-bottom:5px;"><br><a href="${url}" download="${file.name}" class="file-link">📥 ${file.name}</a>`);
            } else {
                appendMsg("Me", `📄 Document: <a href="${url}" download="${file.name}" class="file-link">📥 ${file.name}</a>`);
            }
        };
        reader.readAsArrayBuffer(file);
        inputElement.value = ''; 
    }

    function appendMsg(user, text) {
        const div = document.createElement('div');
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        if (user === "System") {
            div.className = "msg system";
            div.innerHTML = text;
        } else {
            div.className = `msg ${user === "Me" ? "me" : "friend"}`;
            div.innerHTML = `${text}<div class="msg-time">${time}</div>`;
        }
        
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // --- CALL LOGIC ---
    async function startCall(type) {
        if (!conn) return appendMsg("System", "Link chat first!");
        if (activeCall) return;

        callType = type;
        isMicOn = true;
        isCamOn = (type === 'video');

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            
            if (type === 'audio') {
                localStream.getVideoTracks().forEach(track => track.enabled = false);
            }

            const call = peer.call(conn.peer, localStream, { metadata: { type: type } });
            setupCall(call);
            showCallScreen(conn.peer, type);
            playDialTone(); // Caller hears dial tone
        } catch (err) {
            appendMsg("System", "Camera/Mic permission denied!");
            stopAllTones();
        }
    }

    async function answerCall() {
        if (!pendingCall) return;
        document.getElementById('incomingCallPopup').classList.remove('active');
        stopAllTones(); // Stop ringing when answered
        
        isMicOn = true;
        isCamOn = (pendingCall.metadata.type === 'video');

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            
            if (pendingCall.metadata.type === 'audio') {
                localStream.getVideoTracks().forEach(track => track.enabled = false);
            }

            pendingCall.answer(localStream);
            setupCall(pendingCall);
            showCallScreen(pendingCall.peer, pendingCall.metadata.type);
            pendingCall = null;
        } catch (err) {
            appendMsg("System", "Permission denied!");
            rejectCall();
        }
    }

    function rejectCall() {
        if(pendingCall) pendingCall.close();
        pendingCall = null;
        document.getElementById('incomingCallPopup').classList.remove('active');
        stopAllTones();
    }

    function setupCall(call) {
        activeCall = call;
        updateCallUI();

        call.on('stream', rStream => {
            remoteVideo.srcObject = rStream;
            document.getElementById('callStatusText').innerText = "Connected";
            stopAllTones(); // Stop dial tone when connection establishes
        });
        
        call.on('close', hangUp);
        call.on('error', hangUp);
    }

    function showCallScreen(partnerName, type) {
        document.getElementById('callNameDisplay').innerText = partnerName;
        document.getElementById('callStatusText').innerText = "Calling...";
        
        if (type === 'video') {
            callVideos.classList.add('active');
            localVideo.srcObject = localStream;
            document.getElementById('pttBtn').style.display = 'none';
        } else {
            callVideos.classList.remove('active');
            document.getElementById('pttBtn').style.display = 'block';
        }
        
        callScreen.classList.add('active');
        updateCallUI();
    }

    function hangUp() {
        if (activeCall) activeCall.close();
        activeCall = null;
        
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        
        localVideo.srcObject = null;
        remoteVideo.srcObject = null;
        callVideos.classList.remove('active');
        callScreen.classList.remove('active');
        document.getElementById('incomingCallPopup').classList.remove('active');
        stopAllTones();
        appendMsg("System", "Call ended.");
    }

    // --- IN-CALL CONTROLS ---
    function toggleMic() {
        if (!localStream) return;
        isMicOn = !isMicOn;
        localStream.getAudioTracks().forEach(track => track.enabled = isMicOn);
        updateCallUI();
    }

    function toggleCam() {
        if (!localStream || callType === 'audio') return; 
        isCamOn = !isCamOn;
        localStream.getVideoTracks().forEach(track => track.enabled = isCamOn);
        updateCallUI();
    }

    function updateCallUI() {
        document.getElementById('micBtn').classList.toggle('active', !isMicOn);
        document.getElementById('micBtn').innerText = isMicOn ? '🎤' : '🔇';
        
        document.getElementById('camBtn').classList.toggle('active', !isCamOn);
        document.getElementById('camBtn').innerText = isCamOn ? '📷' : '🚫';
    }

    // Walkie Talkie for Audio Call
    const pttBtn = document.getElementById('pttBtn');
    pttBtn.addEventListener('mousedown', () => {
        if (!localStream || !activeCall) return;
        localStream.getAudioTracks().forEach(track => track.enabled = true);
        pttBtn.innerText = "🎤 TRANSMITTING...";
        pttBtn.style.background = 'var(--wa-green)';
        pttBtn.style.color = 'white';
    });

    const stopPtt = () => {
        if (!localStream) return;
        localStream.getAudioTracks().forEach(track => track.enabled = false);
        pttBtn.innerText = "HOLD TO TALK (WALKIE TALKIE)";
        pttBtn.style.background = 'var(--wa-input-bg)';
        pttBtn.style.color = 'var(--wa-green)';
    };

    pttBtn.addEventListener('mouseup', stopPtt);
    pttBtn.addEventListener('mouseleave', stopPtt);
    pttBtn.addEventListener('touchend', stopPtt); // Added for mobile

    // Resume audio context on first click (Browser autoplay policy)
    document.addEventListener('click', () => {
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }, { once: true });

</script>
</body>
</html>
