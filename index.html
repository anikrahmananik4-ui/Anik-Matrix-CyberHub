<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=320, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro P2P Chat</title>
    <!-- Oldest possible PeerJS version (0.3.x) for very old browsers -->
    <script src="https://unpkg.com/peerjs@0.3.24/dist/peer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --wa-green: #00a884; --wa-dark: #111b21; --wa-chat-bg: #0b141a; --wa-input-bg: #2a3942; --wa-bubble-me: #005c4b; --wa-bubble-friend: #202c33; --wa-text: #e9edef; --wa-gray: #8696a0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, Helvetica, sans-serif; background: #111b21; color: #e9edef; height: 100%; width: 100%; overflow: hidden; }

        /* Using block and table layouts instead of Flexbox for 2011 browsers */
        .wrapper { width: 100%; height: 100%; display: table; }
        .main-row { display: table-row; }
        
        /* Header */
        .header { background: #202c33; padding: 10px; border-bottom: 1px solid #2a3942; display: block; overflow: hidden; }
        .header-title { font-size: 16px; font-weight: bold; color: #e9edef; float: left; }
        .header-title span { color: #00a884; }
        .icon-btn { background: none; border: 1px solid #2a3942; color: #8696a0; font-size: 14px; cursor: pointer; padding: 5px 8px; float: right; border-radius: 4px; }

        /* Sidebar Overlay */
        .sidebar { position: absolute; top: 0; left: -100%; width: 85%; height: 100%; background: #111b21; z-index: 10; transition: left 0.3s; overflow-y: auto; }
        .sidebar.visible { left: 0; }
        .qr-section { background: #111b21; padding: 20px; text-align: center; }
        .qr-section input { width: 100%; background: #2a3942; border: 1px solid #3b4a54; padding: 12px; border-radius: 4px; color: white; outline: none; margin-bottom: 15px; text-align: center; font-size: 16px; }
        .qr-section button { width: 100%; background: #00a884; color: white; border: none; padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        #qrcode { display: inline-block; padding: 8px; background: white; border-radius: 4px; margin-top: 15px; }
        #qrcode img { display: block; }
        .my-id-display { font-size: 12px; color: #00a884; margin-top: 10px; cursor: pointer; padding: 8px; background: #2a3942; border-radius: 4px; word-wrap: break-word; }

        /* Chat Area */
        .chat-area { height: 100%; background: #0b141a; position: relative; }
        .chat-header { background: #202c33; padding: 10px; border-bottom: 1px solid #2a3942; overflow: hidden; }
        .chat-user-name { font-weight: bold; font-size: 16px; }
        .chat-user-status { font-size: 12px; color: #8696a0; }

        /* Height calculation trick for old browsers */
        .chat-bg-container { position: absolute; top: 85px; bottom: 55px; left: 0; right: 0; overflow-y: auto; background-color: #0b141a; -webkit-overflow-scrolling: touch; }
        .chat-bg-inner { padding: 10px; min-height: 100%; }

        .msg { max-width: 75%; padding: 8px 12px; border-radius: 8px; font-size: 14px; position: relative; line-height: 1.4; word-wrap: break-word; margin-bottom: 6px; clear: both; }
        .msg.me { background: #005c4b; float: right; border-top-right-radius: 0; }
        .msg.friend { background: #202c33; float: left; border-top-left-radius: 0; }
        .msg.system { background: transparent; color: #8696a0; font-size: 12px; padding: 5px; text-align: center; max-width: 90%; float: none; margin: 10px auto; }
        .msg-time { font-size: 10px; color: rgba(255,255,255,0.4); text-align: right; margin-top: 4px; }

        /* Input Area */
        .input-area { position: absolute; bottom: 0; left: 0; right: 0; background: #202c33; padding: 8px; border-top: 1px solid #2a3942; overflow: hidden; }
        .input-area input { width: 75%; background: #2a3942; border: none; padding: 12px; border-radius: 4px; color: white; outline: none; font-size: 16px; float: left; }
        .send-btn { width: 20%; background: #00a884; border: none; color: white; height: 42px; cursor: pointer; font-size: 16px; font-weight: bold; float: right; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- Header -->
        <div class="header main-row">
            <div class="header-title"><span>⚡</span> Retro Chat</div>
            <button class="icon-btn" onclick="toggleSidebar()">🔗 Link</button>
        </div>

        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="qr-section">
                <button onclick="toggleSidebar()" style="background:transparent; color:white; border:1px solid white; margin-bottom:20px;">✕ Close</button>
                <input type="text" id="codenameInput" placeholder="Enter Codename" maxlength="15">
                <button onclick="initNetwork()">GO ONLINE</button>
                <div id="qrcode"></div>
                <div class="my-id-display" id="myIdDisplay" onclick="copyId()">Tap to copy ID</div>
                <div style="margin-top: 15px; border-top: 1px solid #2a3942; padding-top: 15px;">
                    <input type="text" id="peerIdInput" placeholder="Friend's Codename">
                    <button onclick="connectChat()">LINK CHAT</button>
                </div>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-user-name" id="chatPartnerName">No Chat Linked</div>
                <div class="chat-user-status" id="chatPartnerStatus">Open Link menu to connect</div>
            </div>

            <div class="chat-bg-container" id="chatBox">
                <div class="chat-bg-inner" id="chatBgInner"></div>
            </div>

            <div class="input-area">
                <input type="text" id="chatInput" placeholder="Type message..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">SEND</button>
            </div>
        </div>
    </div>

<script>
    // --- STATE LOGIC ---
    var peer = null;
    var conn = null;         

    var chatBox = document.getElementById('chatBox');
    var chatBgInner = document.getElementById('chatBgInner');

    // --- INIT NETWORK ---
    function initNetwork() {
        var myCodeName = document.getElementById('codenameInput').value.trim().toLowerCase();
        if (!myCodeName) { alert("Please enter a codename!"); return; }

        // Using very old PeerJS syntax for compatibility
        peer = new Peer(myCodeName, { debug: 0 });

        peer.on('open', function(id) {
            document.getElementById('myIdDisplay').innerText = "ID: " + id;
            appendMsg("System", "You are online as " + id);

            var currentUrl = window.location.href.split('?')[0];
            var shareUrl = currentUrl + "?id=" + id;
            var qrcodeContainer = document.getElementById('qrcode');
            qrcodeContainer.innerHTML = ""; 
            new QRCode(qrcodeContainer, { text: shareUrl, width: 100, height: 100, colorDark : "#000000", colorLight : "#ffffff" });

            var urlParams = new URLSearchParams(window.location.search);
            var targetId = urlParams.get('id');
            if (targetId && targetId !== id) {
                document.getElementById('peerIdInput').value = targetId;
                setTimeout(function() { connectChat(); }, 1500);
            }
        });

        peer.on('connection', function(c) {
            conn = c;
            document.getElementById('peerIdInput').value = c.peer;
            setupChat();
        });

        peer.on('error', function(err) {
            appendMsg("System", "Error: " + err.type);
            if(err.type === 'unavailable-id') alert("Codename taken! Try another.");
        });
    }

    function copyId() {
        if(peer && peer.id) {
            // Old school copy method
            var textArea = document.createElement("textarea");
            textArea.value = peer.id;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            textArea.remove();
            appendMsg("System", "Codename copied!");
        }
    }

    function toggleSidebar() {
        var sidebar = document.getElementById('sidebar');
        if (sidebar.className.indexOf('visible') === -1) {
            sidebar.className = sidebar.className + ' visible';
        } else {
            sidebar.className = sidebar.className.replace(' visible', '');
        }
    }

    // --- CHAT LOGIC ---
    function connectChat() {
        var friendId = document.getElementById('peerIdInput').value.trim().toLowerCase();
        if (!friendId) { appendMsg("System", "Enter Friend's Codename!"); return; }
        if (conn) return;
        conn = peer.connect(friendId);
        setupChat();
    }

    function setupChat() {
        conn.on('open', function() {
            document.getElementById('chatPartnerName').innerText = conn.peer;
            document.getElementById('chatPartnerStatus').innerText = "Online";
            appendMsg("System", "Chat secured with " + conn.peer);
            toggleSidebar(); // Close sidebar on connect
        });
        
        conn.on('data', function(data) { 
            appendMsg("Friend", data); 
        });
        
        conn.on('close', function() {
            document.getElementById('chatPartnerName').innerText = "Disconnected";
            document.getElementById('chatPartnerStatus').innerText = "Offline";
            conn = null;
        });
    }

    function handleKeyPress(e) {
        // Support both modern and very old event models
        var key = e.key || e.keyCode;
        if (key === 'Enter' || key === 13) { sendMessage(); }
    }

    function sendMessage() {
        var msg = document.getElementById('chatInput').value;
        if (conn && conn.open && msg) {
            conn.send(msg);
            appendMsg("Me", msg);
            document.getElementById('chatInput').value = "";
        }
    }

    function appendMsg(user, text) {
        var div = document.createElement('div');
        var time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

        if (user === "System") {
            div.className = "msg system";
            div.innerHTML = text;
        } else {
            div.className = "msg " + (user === "Me" ? "me" : "friend");
            div.innerHTML = text + "<div class='msg-time'>" + time + "</div>";
        }

        chatBgInner.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

</script>
</body>
</html>
