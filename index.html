<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anik-Matrix Cyber-Hub</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --danger: #ff0055; --success: #00ff66; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; background: #020205; color: white; font-family: 'Orbitron', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        #bg { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.4; }

        .hub-container { background: var(--glass); backdrop-filter: blur(15px); padding: 25px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); width: 90%; max-width: 400px; text-align: center; box-shadow: 0 0 40px rgba(0, 242, 255, 0.1); max-height: 95vh; overflow-y: auto; }
        .hub-container::-webkit-scrollbar { width: 5px; }
        .hub-container::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 10px; }
        
        .header { font-size: 12px; letter-spacing: 3px; color: var(--neon); margin-bottom: 15px; text-shadow: 0 0 10px var(--neon); }

        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        video { width: 100%; border-radius: 10px; background: black; border: 1px solid var(--neon); transform: scaleX(-1); transition: 0.3s; }
        video.active-call { box-shadow: 0 0 15px var(--neon); }

        #chatBox { height: 100px; background: rgba(0,0,0,0.5); border-radius: 10px; overflow-y: auto; padding: 10px; font-size: 11px; text-align: left; margin-bottom: 10px; border: 1px solid #333; scrollbar-width: thin; scrollbar-color: var(--neon) black; }
        .msg { margin-bottom: 5px; border-bottom: 1px solid #222; padding-bottom: 2px; word-break: break-all; }
        .msg.me { color: var(--neon); }
        .msg.system { color: var(--danger); font-size: 10px; text-align: center; border: none; }

        input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid #444; padding: 10px; border-radius: 5px; color: white; box-sizing: border-box; margin-bottom: 10px; outline: none; font-family: 'Orbitron', sans-serif; font-size: 11px; }
        input:focus { border-color: var(--neon); box-shadow: 0 0 5px var(--neon); }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        button { padding: 10px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 10px; font-family: 'Orbitron', sans-serif; transition: 0.2s; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-call { background: var(--neon); color: black; }
        .btn-call:hover:not(:disabled) { box-shadow: 0 0 15px var(--neon); }
        .btn-hangup { background: var(--danger); color: white; }
        .btn-hangup:hover:not(:disabled) { box-shadow: 0 0 15px var(--danger); }
        .btn-link { background: var(--success); color: black; }
        .btn-accept { background: var(--success); color: black; animation: pulse 1s infinite; }
        
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 102, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(0, 255, 102, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 102, 0); } }

        #setupScreen { display: block; }
        #hubScreen { display: none; }
        #codenameInput { font-size: 14px; text-align: center; letter-spacing: 2px; text-transform: lowercase; }

        #profileSection { margin-bottom: 15px; padding: 10px; border: 1px solid #333; border-radius: 10px; background: rgba(0,0,0,0.2); }
        #myName { font-size: 14px; color: var(--success); margin-bottom: 10px; cursor: pointer; text-shadow: 0 0 5px var(--success); }
        #qrcode { display: inline-block; padding: 8px; background: white; border-radius: 8px; box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }
        #qrcode img { display: block; }

        #pttBtn { width: 70px; height: 70px; border-radius: 50%; background: black; border: 3px solid var(--danger); color: var(--danger); font-size: 9px; margin: 0 auto 15px auto; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px var(--danger); transition: 0.2s; user-select: none; }
        #pttBtn:active { background: var(--danger); color: black; box-shadow: 0 0 25px var(--danger); transform: scale(0.95); }
        #pttBtn.transmitting { background: var(--danger); color: black; box-shadow: 0 0 25px var(--danger); }
    </style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="hub-container" id="setupScreen">
    <div class="header">ANIK-MATRIX CYBER-HUB</div>
    <div style="font-size: 30px; margin-bottom: 20px;">👤</div>
    <input type="text" id="codenameInput" placeholder="ENTER CODENAME" maxlength="15" onkeypress="if(event.key==='Enter') initNetwork()">
    <button class="btn-call" style="width: 100%; padding: 15px;" onclick="initNetwork()">INITIALIZE NETWORK</button>
    <div style="font-size: 9px; color: #666; margin-top: 15px;">NO LONG IDS. JUST SHARE YOUR CODENAME.</div>
</div>

<div class="hub-container" id="hubScreen">
    <div class="header">ANIK-MATRIX CYBER-HUB</div>

    <div class="video-grid">
        <video id="localVideo" autoplay muted playsinline></video>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <div id="profileSection">
        <div id="myName" title="Click to copy">CODENAME: ...</div>
        <div id="qrcode"></div>
        <div style="font-size: 9px; color: #888; margin-top: 8px;">SCAN OR TYPE CODENAME TO LINK</div>
    </div>

    <!-- Incoming Call Popup (Hidden by default) -->
    <div id="incomingCallPopup" style="display:none; margin-bottom: 10px; padding: 15px; border: 2px solid var(--success); background: rgba(0,255,102,0.1); border-radius: 10px;">
        <div style="margin-bottom: 10px; color: var(--success); font-size: 12px;">INCOMING CALL...</div>
        <button class="btn-accept" style="width: 100%; padding: 12px;" onclick="answerCall()">ACCEPT CALL</button>
    </div>

    <input type="text" id="peerId" placeholder="FRIEND'S CODENAME">

    <div class="controls">
        <button id="callBtn" class="btn-call" onclick="initiateVideoCall()">Video Call</button>
        <button id="hangBtn" class="btn-hangup" onclick="hangUp()" disabled>Hang Up</button>
        <button class="btn-link" onclick="connectChat()" style="grid-column: span 2;">Link Chat</button>
    </div>

    <div id="chatBox"></div>
    <input type="text" id="chatInput" placeholder="Secure Message..." onkeypress="if(event.key==='Enter') sendMessage()">

    <div id="pttBtn">HOLD<br>WALKIE</div>
    <div id="status" style="font-size: 10px; color: #666; margin-top: 10px;">SYSTEM STANDBY</div>
</div>

<script>
    // --- MATRIX RAIN ---
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const letters = "MATRIX01"; const fontSize = 12; const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);
    function drawMatrix() {
        ctx.fillStyle = "rgba(2, 2, 5, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00f2ff"; ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = letters[Math.floor(Math.random() * letters.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 50);
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

    // --- VARIABLES ---
    let peer;
    let conn = null;         
    let activeCall = null;   
    let localStream = null;
    let pendingCall = null;  // For incoming calls waiting to be answered
    
    const status = document.getElementById('status');
    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');
    const callBtn = document.getElementById('callBtn');
    const hangBtn = document.getElementById('hangBtn');
    const pttBtn = document.getElementById('pttBtn');
    const peerIdInput = document.getElementById('peerId');

    // --- STEP 1: INIT NETWORK ---
    function initNetwork() {
        myCodeName = document.getElementById('codenameInput').value.trim().toLowerCase().replace(/\s+/g, '');
        if (!myCodeName) return alert("Please enter a codename!");

        document.getElementById('setupScreen').style.display = 'none';
        document.getElementById('hubScreen').style.display = 'block';

        peer = new Peer(myCodeName);

        peer.on('open', id => {
            document.getElementById('myName').innerText = "CODENAME: " + id;
            status.innerText = "ONLINE - AWAITING LINK";
            
            const currentUrl = window.location.href.split('?')[0];
            const shareUrl = currentUrl + "?id=" + id;
            const qrcodeContainer = document.getElementById('qrcode');
            qrcodeContainer.innerHTML = ""; 
            new QRCode(qrcodeContainer, { text: shareUrl, width: 100, height: 100, colorDark : "#000000", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H });

            const urlParams = new URLSearchParams(window.location.search);
            const targetId = urlParams.get('id');
            if (targetId && targetId !== id) {
                peerIdInput.value = targetId;
                appendMsg("System", "QR Scanned! Auto-linking to " + targetId + "...");
                setTimeout(() => connectChat(), 1000);
            }
        });

        peer.on('connection', c => {
            conn = c;
            peerIdInput.value = c.peer;
            setupChat();
        });

        // Handle Incoming Call (Don't auto-answer to fix browser permissions)
        peer.on('call', call => {
            pendingCall = call;
            document.getElementById('incomingCallPopup').style.display = 'block';
            appendMsg("System", "Incoming call from " + call.peer);
        });

        peer.on('error', err => {
            appendMsg("System", "Error: " + err.type);
            if(err.type === 'unavailable-id') alert("Codename already taken! Please refresh and try another.");
            status.innerText = "CONNECTION ERROR";
        });
    }

    // Answer Incoming Call
    async function answerCall() {
        if (!pendingCall) return;
        document.getElementById('incomingCallPopup').style.display = 'none';
        
        // Get media on button click (Fixes Audio/Video permissions)
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        localVideo.srcObject = localStream;
        localVideo.classList.add('active-call');
        
        pendingCall.answer(localStream);
        setupCall(pendingCall);
        pendingCall = null;
    }

    document.getElementById('myName').addEventListener('click', function() {
        navigator.clipboard.writeText(peer.id);
        appendMsg("System", "Codename Copied!");
    });

    // --- OUTGOING CALL LOGIC ---
    async function initiateVideoCall() {
        const friendId = peerIdInput.value.trim().toLowerCase();
        if (!friendId) return appendMsg("System", "Enter Friend's Codename!");
        if (activeCall) return appendMsg("System", "Already in a call!");

        // Get media on button click (Fixes Audio/Video permissions)
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        localVideo.srcObject = localStream;
        localVideo.classList.add('active-call');

        const call = peer.call(friendId, localStream);
        setupCall(call);
    }

    function setupCall(call) {
        activeCall = call;
        callBtn.disabled = true; 
        hangBtn.disabled = false;

        call.on('stream', rStream => {
            remoteVideo.srcObject = rStream; 
            remoteVideo.classList.add('active-call'); 
            status.innerText = "CONNECTED (UNMUTED)";
        });
        
        call.on('close', hangUp);
        call.on('error', hangUp);
    }

    function hangUp() {
        if (activeCall) activeCall.close();
        activeCall = null; 
        
        // Stop all tracks (Camera & Mic light off)
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null; 
            localVideo.srcObject = null; 
            localVideo.classList.remove('active-call');
        }
        
        remoteVideo.srcObject = null; 
        remoteVideo.classList.remove('active-call');
        callBtn.disabled = false; 
        hangBtn.disabled = true;
        status.innerText = "DISCONNECTED"; 
        appendMsg("System", "Call Ended.");
    }

    // --- WALKIE TALKIE LOGIC (Mute/Unmute) ---
    pttBtn.addEventListener('mousedown', () => {
        if (!localStream || !activeCall) return appendMsg("System", "Must be in a call first!");
        localStream.getAudioTracks().forEach(track => track.enabled = true);
        pttBtn.classList.add('transmitting'); 
        status.innerText = "🎤 TRANSMITTING...";
    });

    const stopTransmitting = () => {
        if (localStream) {
            localStream.getAudioTracks().forEach(track => track.enabled = false);
        }
        pttBtn.classList.remove('transmitting');
        if (activeCall) status.innerText = "CONNECTED (MUTED)";
    };

    pttBtn.addEventListener('mouseup', stopTransmitting);
    pttBtn.addEventListener('mouseleave', stopTransmitting); 

    // --- CHAT LOGIC ---
    function connectChat() {
        const friendId = peerIdInput.value.trim().toLowerCase();
        if (!friendId) return appendMsg("System", "Enter Friend's Codename!");
        if (conn) return appendMsg("System", "Chat already linked!");
        
        conn = peer.connect(friendId);
        setupChat();
        status.innerText = "LINKING CHAT...";
    }

    function setupChat() {
        conn.on('open', () => {
            appendMsg("System", "Chat Secured with " + conn.peer + "!");
            status.innerText = "CHAT LINKED";
        });
        conn.on('data', data => appendMsg(conn.peer, data));
        conn.on('close', () => {
            appendMsg("System", "Chat Disconnected.");
            conn = null; status.innerText = "CHAT LOST";
        });
    }

    function sendMessage() {
        const msg = document.getElementById('chatInput').value;
        if (conn && conn.open && msg) {
            conn.send(msg);
            appendMsg("Me", msg);
            document.getElementById('chatInput').value = "";
        } else if (!conn) {
            appendMsg("System", "No chat connection!");
        }
    }

    function appendMsg(user, text) {
        const div = document.createElement('div');
        div.className = "msg " + (user === "Me" ? "me" : (user === "System" ? "system" : ""));
        div.innerHTML = user !== "System" ? `[${user}]: ${text}` : text;
        document.getElementById('chatBox').appendChild(div);
        document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
    }

</script>
</body>
</html>
